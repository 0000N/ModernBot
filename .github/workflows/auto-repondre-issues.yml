name: Auto-réponse aux nouvelles issues

on:
  issues:
    types: [opened]

jobs:
  auto-repondre:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Répondre automatiquement
        uses: actions/github-script@v7
        with:
          script: |
            const message = `Merci pour ton signalement ! 🙏

Tu viens de créer une issue sur **ModernBot** — ce bot est maintenant géré via **OpenCode**.

### Ce qui va se passer :
1. ✅ Ton issue est enregistrée et sera analysée
2. 🔧 Si c'est un bug, le code sera corrigé et proposé au propriétaire pour validation
3. 📬 Une notification sera envoyée

### En attendant :
- Vérifie que tu utilises la dernière version du script
- Redémarre ta page Grepolis après avoir installé la MAJ
- Si c'est un problème de farming, le conseiller Capitaine doit être actif

*Réponse automatique — un humain valide avant publication*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

            // Ajouter le label "en_attente" si pas déjà présent
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['en_attente']
            });
